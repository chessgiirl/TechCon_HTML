<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Contact – TechCon 2024</title>
</head>
<body>
  <header>
    <h1>TechCon 2024</h1>
    <nav>
      <a href="about.html">About</a>
      <a href="schedule.html">Schedule</a>
      <a href="register.html">Register</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Contact Us</h2>
    <p>Email us at: <a href="mailto:email@example.com">email@example.com</a></p>

    <p>Follow us on:
      <a href="https://twitter.com" target="_blank">Twitter</a> |
      <a href="https://linkedin.com" target="_blank">LinkedIn</a>
    </p>

    <h3>Our Location</h3>
    <iframe src="https://www.google.com/maps/embed?pb=!1m18..."
            width="400" height="300" style="border:0;" allowfullscreen="" loading="lazy"></iframe>

    <h3>Send Us a Message</h3>
    <form action="#" method="post">
      <label for="cname">Name:</label>
      <input type="text" id="cname" name="cname" required><br><br>

      <label for="cemail">Email:</label>
      <input type="email" id="cemail" name="cemail" required><br><br>

      <label for="message">Message:</label><br>
      <textarea id="message" name="message" rows="5" cols="40" required></textarea><br><br>

      <button type="submit">Send Message</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2024 TechCon 2024 – All rights reserved.</p>
  </footer>
</body>
</html>
