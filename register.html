<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Register for TechCon 2024</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:0;background:#f7f9fe;color:#222}
    header{background:#0b5bd7;color:#fff;padding:18px}
    nav ul{display:flex;gap:12px;list-style:none;padding:0;margin:8px 0 0}
    main{max-width:620px;margin:20px auto;background:#fff;padding:20px;border-radius:6px}
    form{display:flex;flex-direction:column;gap:10px}
    label{font-weight:600}
    input,select{padding:8px;border-radius:4px;border:1px solid #cfdffb}
    .small{font-size:.9rem;color:#666}
    button{background:#0b5bd7;color:#fff;border:none;padding:10px;border-radius:4px;cursor:pointer}
    footer{background:#eef3ff;padding:12px;text-align:center}
  </style>
</head>
<body>
  <header>
    <h1>Register for TechCon 2024</h1>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="schedule.html">Schedule</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Sign Up</h2>
    <form action="#" method="post" aria-label="TechCon registration form">
      <label for="name">Full name</label>
      <input id="name" name="name" type="text" placeholder="Your name" required>

      <label for="email">Email address</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>

      <label for="password">Password</label>
      <input id="password" name="password" type="password" minlength="6" placeholder="Choose a password" required>

      <label for="confirm_password">Confirm password</label>
      <input id="confirm_password" name="confirm_password" type="password" minlength="6" placeholder="Confirm password" required>

      <label>
        <input type="checkbox" id="terms" name="terms" required>
        I agree to the <a href="#" target="_blank">terms and conditions</a>.
      </label>

      <button type="submit">Register Now</button>
      <p class="small">You will receive a confirmation email with ticket information.</p>
    </form>
  </main>

  <footer>&copy; 2024 TechCon • Made by Chessgiirl - <a href="https://github.com/chessgiirl" target="_blank" rel="noopener">here</a></footer>
</body>
</html>
