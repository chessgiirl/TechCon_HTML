<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Register - TechCon 2024</title>
</head>
<body>
  <header>
    <h1>TechCon 2024</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="schedule.html">Schedule</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <main>
    <h2>Register Now</h2>
    <form>
      <label for="full-name">Full Name:</label>
      <input type="text" id="full-name" name="name" required><br>

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required><br>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required><br>

      <label for="confirm-password">Confirm Password:</label>
      <input type="password" id="confirm-password" name="confirm_password" required><br>

      <label>
        <input type="checkbox" id="terms" name="terms" required>
        I agree to the terms and conditions
      </label><br>

      <button type="submit">Register Now</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2024 TechCon 2024 – All rights reserved.</p>
  </footer>
</body>
</html>
